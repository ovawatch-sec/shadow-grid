<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="ShadowGrid">
  <defs>
    <!-- Grid strokes: lit accent-green in the top-left, dimming into shadow toward bottom-right. -->
    <linearGradient id="sg-grid" x1="10" y1="10" x2="54" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3dffa6"/>
      <stop offset="0.4" stop-color="#00e87a"/>
      <stop offset="0.7" stop-color="#00bfff"/>
      <stop offset="1" stop-color="#1f5e7a"/>
    </linearGradient>
    <!-- Node fill: bright on the lit side, dimming to a shadow tone. -->
    <linearGradient id="sg-node" x1="10" y1="10" x2="54" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5dffb6"/>
      <stop offset="0.5" stop-color="#00bfff"/>
      <stop offset="1" stop-color="#244a64"/>
    </linearGradient>
    <!-- Soft halo behind the central scan hub. -->
    <radialGradient id="sg-glow" cx="32" cy="32" r="11" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00e87a" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#00e87a" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#00e87a" stop-opacity="0"/>
    </radialGradient>
    <!-- Radar sweep wedge. -->
    <radialGradient id="sg-sweep" cx="32" cy="32" r="18" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00e87a" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#00e87a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Radar sweep -->
  <path d="M32 32 L27.4 17.7 A15 15 0 0 1 36.6 17.7 Z" fill="url(#sg-sweep)"/>

  <!-- Network diagonals from the hub to the corners -->
  <g stroke="url(#sg-grid)" stroke-width="0.9" stroke-linecap="round" opacity="0.3">
    <line x1="32" y1="32" x2="16" y2="16"/>
    <line x1="32" y1="32" x2="48" y2="16"/>
    <line x1="32" y1="32" x2="16" y2="48"/>
    <line x1="32" y1="32" x2="48" y2="48"/>
  </g>

  <!-- The grid -->
  <g stroke="url(#sg-grid)" stroke-width="2.1" stroke-linecap="round">
    <line x1="16" y1="16" x2="48" y2="16"/>
    <line x1="16" y1="32" x2="48" y2="32"/>
    <line x1="16" y1="48" x2="48" y2="48"/>
    <line x1="16" y1="16" x2="16" y2="48"/>
    <line x1="32" y1="16" x2="32" y2="48"/>
    <line x1="48" y1="16" x2="48" y2="48"/>
  </g>

  <!-- Grid nodes -->
  <g fill="url(#sg-node)">
    <circle cx="16" cy="16" r="3.2"/>
    <circle cx="48" cy="16" r="2.8"/>
    <circle cx="16" cy="48" r="2.8"/>
    <circle cx="48" cy="48" r="2.6"/>
    <circle cx="32" cy="16" r="2.4"/>
    <circle cx="16" cy="32" r="2.4"/>
    <circle cx="48" cy="32" r="2.2"/>
    <circle cx="32" cy="48" r="2.2"/>
  </g>

  <!-- Central scan hub / target reticle -->
  <circle cx="32" cy="32" r="13" fill="url(#sg-glow)"/>
  <circle cx="32" cy="32" r="6" fill="#060c16" stroke="#00e87a" stroke-width="1.4"/>
  <circle cx="32" cy="32" r="2.6" fill="#00e87a"/>
  <g stroke="#00e87a" stroke-width="1.4" stroke-linecap="round">
    <line x1="32" y1="24" x2="32" y2="21"/>
    <line x1="32" y1="40" x2="32" y2="43"/>
    <line x1="24" y1="32" x2="21" y2="32"/>
    <line x1="40" y1="32" x2="43" y2="32"/>
  </g>
</svg>
