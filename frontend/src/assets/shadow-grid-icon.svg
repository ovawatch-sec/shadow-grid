<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="ShadowGrid">
  <defs>
    <linearGradient id="sg-tile" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0e2034"/>
      <stop offset="1" stop-color="#070e1a"/>
    </linearGradient>
    <linearGradient id="sg-grid" x1="14" y1="14" x2="52" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00e87a"/>
      <stop offset="0.45" stop-color="#00bfff"/>
      <stop offset="1" stop-color="#00bfff" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="sg-node" x1="14" y1="14" x2="52" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00e87a"/>
      <stop offset="0.55" stop-color="#00bfff"/>
      <stop offset="1" stop-color="#1b3a54"/>
    </linearGradient>
    <radialGradient id="sg-glow" cx="33" cy="33" r="11" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00e87a" stop-opacity="0.85"/>
      <stop offset="0.5" stop-color="#00e87a" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#00e87a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded app tile -->
  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#sg-tile)" stroke="#00e87a" stroke-opacity="0.28"/>

  <!-- Mark, padded inside the tile -->
  <g transform="translate(13 13) scale(0.594)">
    <g stroke="url(#sg-grid)" stroke-width="1.6" stroke-linecap="round" opacity="0.55">
      <line x1="32" y1="32" x2="16" y2="16"/>
      <line x1="32" y1="32" x2="48" y2="16"/>
      <line x1="32" y1="32" x2="16" y2="48"/>
      <line x1="32" y1="32" x2="48" y2="48"/>
    </g>
    <g stroke="url(#sg-grid)" stroke-width="2.4" stroke-linecap="round">
      <line x1="16" y1="16" x2="48" y2="16"/>
      <line x1="16" y1="32" x2="48" y2="32"/>
      <line x1="16" y1="48" x2="48" y2="48"/>
      <line x1="16" y1="16" x2="16" y2="48"/>
      <line x1="32" y1="16" x2="32" y2="48"/>
      <line x1="48" y1="16" x2="48" y2="48"/>
    </g>
    <g fill="url(#sg-node)">
      <circle cx="16" cy="16" r="3"/>
      <circle cx="48" cy="16" r="2.8"/>
      <circle cx="16" cy="48" r="2.8"/>
      <circle cx="48" cy="48" r="3.4"/>
      <circle cx="32" cy="16" r="2.2"/>
      <circle cx="16" cy="32" r="2.2"/>
      <circle cx="48" cy="32" r="2.2"/>
      <circle cx="32" cy="48" r="2.2"/>
    </g>
  </g>

  <!-- Central scan hub / target reticle (tile coordinates) -->
  <circle cx="33" cy="33" r="11" fill="url(#sg-glow)"/>
  <circle cx="33" cy="33" r="5.4" fill="#070e1a" stroke="#00e87a" stroke-width="1.3"/>
  <circle cx="33" cy="33" r="2.3" fill="#00e87a"/>
  <g stroke="#00e87a" stroke-width="1.3" stroke-linecap="round">
    <line x1="33" y1="26" x2="33" y2="23.5"/>
    <line x1="33" y1="40" x2="33" y2="42.5"/>
    <line x1="26" y1="33" x2="23.5" y2="33"/>
    <line x1="40" y1="33" x2="42.5" y2="33"/>
  </g>
</svg>
